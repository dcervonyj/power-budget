<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account · Power Budget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="auth-title">
        <a class="auth-card__brand" href="../index.html">
          <span class="brand__mark" aria-hidden="true">P</span>
          <span>Power Budget</span>
        </a>
        <h1 id="auth-title">Create your household</h1>
        <p class="auth-card__lede">
          You'll be able to invite a partner once you're signed in.
        </p>

        <button class="btn btn--secondary btn--block" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="#fff"
              d="M21.6 12.2c0-.7-.1-1.4-.2-2.1H12v3.9h5.4c-.2 1.3-.9 2.4-2 3.1v2.6h3.2c1.9-1.7 3-4.3 3-7.5z"
            />
            <path
              fill="#34A853"
              d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.6c-.9.6-2 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H3.1v2.6C4.7 19.7 8.1 22 12 22z"
            />
            <path
              fill="#FBBC05"
              d="M6.4 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.5H3.1A10 10 0 0 0 2 12c0 1.6.4 3.1 1.1 4.5l3.3-2.6z"
            />
            <path
              fill="#EA4335"
              d="M12 6c1.5 0 2.8.5 3.8 1.5l2.8-2.8C16.9 3.1 14.7 2 12 2 8.1 2 4.7 4.3 3.1 7.5l3.3 2.6C7.2 7.8 9.4 6 12 6z"
            />
          </svg>
          Continue with Google
        </button>

        <div class="auth-divider">or sign up with email</div>

        <form
          class="stack"
          onsubmit="
            event.preventDefault();
            window.location.href = 'onboarding-en.html';
          "
        >
          <div class="field">
            <label class="field__label" for="email">Email</label>
            <input
              class="input"
              id="email"
              type="email"
              autocomplete="email"
              placeholder="you@example.com"
            />
          </div>
          <div class="field">
            <label class="field__label" for="password">Password</label>
            <input
              class="input"
              id="password"
              type="password"
              autocomplete="new-password"
              placeholder="At least 12 characters"
            />
            <span class="field__help"
              >Use 12+ characters with a mix of letters, numbers, and
              symbols.</span
            >
          </div>
          <div class="field">
            <label class="field__label" for="confirm">Confirm password</label>
            <input
              class="input"
              id="confirm"
              type="password"
              autocomplete="new-password"
              placeholder="Repeat your password"
            />
          </div>
          <label class="row" style="gap: 8px">
            <input type="checkbox" class="checkbox" checked />
            <span class="secondary" style="font-size: 12px"
              >I agree to the Terms and the Privacy Policy.</span
            >
          </label>
          <button class="btn btn--primary btn--block btn--lg" type="submit">
            Create account
          </button>
        </form>

        <p class="auth-card__footer">
          Already have an account? <a href="auth-login.html">Sign in</a>
        </p>
      </section>
    </main>
  </body>
</html>
