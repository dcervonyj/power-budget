    <main class="content">
      <div class="page-header">
        <div class="page-header__titles">

      <form onsubmit="window.location='plans-list.html';return false;" style="max-width:800px">

        <!-- Section 1: Plan details -->
        <div class="card card--padded" style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:600;margin-bottom:16px;color:var(--text)">Plan details</div>

            <div class="field">

              <select class="select">

                <option>Household</option>
                <option>Custom</option>
              </select>
            </div>
            <div class="row" style="gap:12px;align-items:flex-start">
              <div class="field" style="flex:1">

              </div>
              <div class="field" style="flex:1">
                <label class="field__label">Date to</label>
                <input class="input" type="date" value="2026-05-31">
              </div>
            </div>
          </div>
        </div>

            <table style="width:100%;border-collapse:collapse;font-size:13px">

                  <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Name</th>
                  <th style="padding:10px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Account</th>
                  <th style="padding:10px 16px;text-align:right;font-size:11px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Amount (PLN)</th>
                  <th style="padding:10px 16px;width:40px"></th>
                </tr>
              </thead>
              <tbody>
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:10px 16px"><input class="input" type="text" value="Salary" style="padding:6px 10px"></td>
                  <td style="padding:10px 16px">
                    <select class="select" style="padding:6px 10px">
                      <option selected>PKO BP</option>
                      <option>Wise</option>
                      <option>mBank</option>

                  </td>
                  <td style="padding:10px 16px;text-align:right"><input class="input" type="number" value="12000" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:10px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
                <tr>
                  <td style="padding:10px 16px"><input class="input" type="text" value="Freelance" style="padding:6px 10px"></td>
                  <td style="padding:10px 16px">
                    <select class="select" style="padding:6px 10px">
                      <option>PKO BP</option>
                      <option selected>Wise</option>
                      <option>mBank</option>

                  </td>
                  <td style="padding:10px 16px;text-align:right"><input class="input" type="number" value="2500" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:10px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Section 3: Expense categories -->

            <div class="card__title">Expense categories</div>
            <button type="button" class="btn btn--secondary btn--sm">＋ Add category</button>
          </div>
          <div class="card__body" style="padding:0">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead>
                <tr style="background:var(--s2)">

                  <td style="padding:8px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:8px 16px"><input class="input" type="text" value="🛒" style="padding:5px 8px;width:48px;text-align:center;font-size:16px"></td>
                  <td style="padding:8px 16px"><input class="input" type="text" value="Groceries" style="padding:6px 10px"></td>
                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="2000" style="padding:6px 10px;text-align:right;width:120px"></td>

                </tr>
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:8px 16px"><input class="input" type="text" value="🚇" style="padding:5px 8px;width:48px;text-align:center;font-size:16px"></td>
                  <td style="padding:8px 16px"><input class="input" type="text" value="Transport" style="padding:6px 10px"></td>
                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="500" style="padding:6px 10px;text-align:right;width:120px"></td>

                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="300" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:8px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:8px 16px"><input class="input" type="text" value="🎬" style="padding:5px 8px;width:48px;text-align:center;font-size:16px"></td>
                  <td style="padding:8px 16px"><input class="input" type="text" value="Entertainment" style="padding:6px 10px"></td>
                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="250" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:8px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
                <tr style="border-bottom:1px solid var(--border)">
                  <td style="padding:8px 16px"><input class="input" type="text" value="👕" style="padding:5px 8px;width:48px;text-align:center;font-size:16px"></td>
                  <td style="padding:8px 16px"><input class="input" type="text" value="Clothing" style="padding:6px 10px"></td>
                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="300" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:8px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
                <tr>
                  <td style="padding:8px 16px"><input class="input" type="text" value="📱" style="padding:5px 8px;width:48px;text-align:center;font-size:16px"></td>
                  <td style="padding:8px 16px"><input class="input" type="text" value="Subscriptions" style="padding:6px 10px"></td>
                  <td style="padding:8px 16px;text-align:right"><input class="input" type="number" value="290" style="padding:6px 10px;text-align:right;width:120px"></td>
                  <td style="padding:8px 16px"><button type="button" class="icon-btn" style="color:var(--danger)">✕</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Footer buttons -->
        <div class="row row--between">
          <a class="btn btn--ghost" href="plans-list.html">Cancel</a>
          <button type="submit" class="btn btn--primary">Save plan</button>
        </div>
      </form>
    </main>
  </div>
</div>
<script>
  function toggleTheme(){
    var html=document.documentElement;
    var cur=html.getAttribute('data-theme')||'dark';
    var nxt=cur==='dark'?'light':'dark';
    html.setAttribute('data-theme',nxt);
    localStorage.setItem('pb-theme',nxt);
    document.querySelectorAll('.theme-btn').forEach(function(b){
      b.textContent=nxt==='dark'?'☀️ Light mode':'🌙 Dark mode';
    });
  }
  function toggleMenu(btn){
    var menu=btn.nextElementSibling;
    var open=menu.dataset.open==='true';
    document.querySelectorAll('.dropdown__menu[data-open="true"]').forEach(function(m){
      m.dataset.open='false';
      if(m.previousElementSibling) m.previousElementSibling.setAttribute('aria-expanded','false');
    });
    if(!open){
      menu.dataset.open='true';
      btn.setAttribute('aria-expanded','true');
    }
  }
  document.addEventListener('click',function(e){
    document.querySelectorAll('.dropdown__menu[data-open="true"]').forEach(function(m){
      if(!m.parentElement.contains(e.target)){
        m.dataset.open='false';
        if(m.previousElementSibling) m.previousElementSibling.setAttribute('aria-expanded','false');
      }
    });
  });
</script>
</body>
</html>
