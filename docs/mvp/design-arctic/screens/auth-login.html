<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in — PowerBudget</title>
  <link rel="stylesheet" href="../styles.css">
  <script>(function(){var s=localStorage.getItem('pb-theme')||'dark';document.documentElement.setAttribute('data-theme',s);})();</script>
</head>
<body>
<button onclick="toggleTheme()" id="theme-fixed-btn" style="position:fixed;top:16px;right:16px;z-index:200" class="btn btn--secondary btn--sm">☀️ Light mode</button>
<div class="auth-shell">
  <section class="auth-card">
    <a class="auth-card__brand" href="../index.html"><span class="brand-mark">P</span> Power<em>Budget</em></a>
    <h1>Welcome back</h1>
    <p class="auth-card__lede">Sign in to your household.</p>
    <button class="btn btn--secondary btn--block" style="gap:10px;justify-content:center">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">or sign in with email</div>
    <form class="stack-sm" onsubmit="window.location='dashboard-en.html';return false;" style="margin-bottom:16px">
      <div class="field">
        <label class="field__label" for="email">Email address</label>
        <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="field__label" for="password">Password</label>
        <input class="input" id="password" type="password" placeholder="Your password" autocomplete="current-password">
      </div>
      <div class="row row--between" style="margin-top:4px">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer">
          <input type="checkbox" class="checkbox"> Remember me
        </label>
        <a href="#" style="font-size:12px">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn--primary btn--block" style="margin-top:8px">Sign in</button>
    </form>
    <div style="text-align:center;margin-bottom:8px">
      <a href="auth-magic-link.html" style="font-size:13px">Sign in with a magic link instead</a>
    </div>
    <div class="auth-card__footer">
      Don't have an account? <a href="auth-signup.html">Create account</a>
    </div>
  </section>
</div>
<script>
  function toggleTheme(){
    var html=document.documentElement;
    var cur=html.getAttribute('data-theme')||'dark';
    var nxt=cur==='dark'?'light':'dark';
    html.setAttribute('data-theme',nxt);
    localStorage.setItem('pb-theme',nxt);
    document.querySelectorAll('.theme-btn').forEach(function(b){
      b.textContent=nxt==='dark'?'☀️ Light mode':'🌙 Dark mode';
    });
    document.querySelectorAll('button[onclick="toggleTheme()"]').forEach(function(b){
      b.textContent=nxt==='dark'?'☀️ Light mode':'🌙 Dark mode';
    });
  }
  function toggleMenu(btn){
    var menu=btn.nextElementSibling;
    var open=menu.dataset.open==='true';
    document.querySelectorAll('.dropdown__menu[data-open="true"]').forEach(function(m){
      m.dataset.open='false';
      if(m.previousElementSibling) m.previousElementSibling.setAttribute('aria-expanded','false');
    });
    if(!open){
      menu.dataset.open='true';
      btn.setAttribute('aria-expanded','true');
    }
  }
  document.addEventListener('click',function(e){
    document.querySelectorAll('.dropdown__menu[data-open="true"]').forEach(function(m){
      if(!m.parentElement.contains(e.target)){
        m.dataset.open='false';
        if(m.previousElementSibling) m.previousElementSibling.setAttribute('aria-expanded','false');
      }
    });
  });
</script>
</body>
</html>
