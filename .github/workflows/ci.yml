name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  ci:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck & test
        run: pnpm turbo run lint typecheck test --continue

      - name: Check OpenAPI spec drift
        run: |
          pnpm -F @power-budget/backend generate:openapi
          git diff --exit-code packages/backend/openapi.json

      - name: Collect coverage reports
        if: always()
        run: find . -name 'lcov.info' -not -path '*/node_modules/*' | xargs -I{} echo "{}"

      - name: Upload coverage artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
          if-no-files-found: ignore
