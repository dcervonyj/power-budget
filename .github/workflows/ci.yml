name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  ci:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck & test
        run: pnpm turbo run lint typecheck test --continue

      - name: Check OpenAPI spec drift
        run: |
          cd packages/backend && pnpm run generate:openapi && cd ../..
          pnpm exec prettier --write packages/backend/openapi.json
          git diff --exit-code packages/backend/openapi.json

      - name: Check API types drift
        run: |
          pnpm --filter @power-budget/shared-app codegen
          pnpm exec prettier --write packages/shared-app/src/contract/api-types.ts
          git diff --exit-code packages/shared-app/src/contract/api-types.ts

      - name: Collect coverage reports
        if: always()
        run: find . -name 'lcov.info' -not -path '*/node_modules/*' | xargs -I{} echo "{}"

      - name: Upload coverage artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/*/coverage/
          if-no-files-found: ignore

  playwright:
    name: Playwright E2E (smoke)
    runs-on: ubuntu-latest
    needs: ci
    # Only run on PRs, not on push to master (to keep CI fast)
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: packages/web

      - name: Run Playwright smoke tests
        run: pnpm exec playwright test --project=chromium --reporter=github
        working-directory: packages/web
        env:
          # No backend in CI — smoke tests handle missing server gracefully
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          if-no-files-found: ignore
