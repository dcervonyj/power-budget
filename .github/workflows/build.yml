name: Build & Stage

on:
  push:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_CACHE_DIR: .turbo

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo run build

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: packages/web/dist
          if-no-files-found: warn

      - name: Upload core dist
        uses: actions/upload-artifact@v4
        with:
          name: core-dist
          path: packages/core/dist
          if-no-files-found: warn

      - name: Upload shared-app dist
        uses: actions/upload-artifact@v4
        with:
          name: shared-app-dist
          path: packages/shared-app/dist
          if-no-files-found: warn

  deploy-staging:
    name: Deploy to staging
    needs: [build]
    runs-on: ubuntu-latest
    environment: staging

    steps:
      # INF-009 (ADR-002): backend deploys to Render via a deploy hook.
      # Set the RENDER_DEPLOY_HOOK_URL secret in the "staging" environment;
      # until it exists the step is a no-op so CI stays green.
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret not set — skipping deploy."
            exit 0
          fi
          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
